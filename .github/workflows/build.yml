name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout EdgeAdmin
        uses: actions/checkout@v4
        with:
          path: EdgeAdmin

      - name: Checkout EdgeCommon (sibling)
        uses: actions/checkout@v4
        with:
          repository: hujiali30001/freecdn-common
          path: EdgeCommon

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: EdgeAdmin/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd EdgeAdmin
          VERSION=${GITHUB_REF_NAME:-dev}
          go build -tags community \
            -ldflags "-s -w -X github.com/TeaOSLab/EdgeAdmin/internal/const.Version=${VERSION#v}" \
            -o "../dist/edge-admin" \
            ./cmd/edge-admin/
          
          cd ../dist
          ARCHIVE="freecdn-admin-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          
          # 复制 web 静态资源
          cp -r ../EdgeAdmin/web ./web
          tar czf "${ARCHIVE}" edge-admin web
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freecdn-admin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
