name: Upstream Security Check

on:
  schedule:
    # 每周一 UTC 00:00 运行（北京时间周一 08:00）
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # 支持手动触发

permissions:
  issues: write
  contents: read

jobs:
  check-upstream:
    name: Check GoEdge upstream for new tags
    runs-on: ubuntu-latest

    env:
      # FreeCDN 锁定的安全基线，不跟踪此版本及以上
      SAFE_BASELINE: "v1.3.9"
      # 上游仓库（注意 GoEdge 是 TeaOSLab/EdgeAdmin）
      UPSTREAM_REPO: "TeaOSLab/EdgeAdmin"

    steps:
      - name: Fetch upstream tags
        id: fetch
        run: |
          echo "Fetching tags from upstream: $UPSTREAM_REPO"
          # 获取最新的 10 个 tag，按版本排序
          UPSTREAM_TAGS=$(curl -fsSL \
            "https://api.github.com/repos/${UPSTREAM_REPO}/tags?per_page=10" \
            -H "Accept: application/vnd.github+json" \
            | jq -r '.[].name' 2>/dev/null || echo "")

          if [ -z "$UPSTREAM_TAGS" ]; then
            echo "WARNING: Failed to fetch upstream tags, skipping check"
            echo "has_new_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Upstream tags found:"
          echo "$UPSTREAM_TAGS"

          # 找出所有高于安全基线的 tag
          NEW_TAGS=""
          while IFS= read -r tag; do
            # 跳过非 v 开头的 tag
            [[ "$tag" =~ ^v[0-9] ]] || continue
            # 版本比较：仅关注大于基线的
            if printf '%s\n%s\n' "$SAFE_BASELINE" "$tag" | sort -V -C 2>/dev/null; then
              # sort -V -C 返回 0 表示已排好序（基线 <= tag），再排除等于基线的
              if [ "$tag" != "$SAFE_BASELINE" ]; then
                NEW_TAGS="${NEW_TAGS}${tag}\n"
              fi
            fi
          done <<< "$UPSTREAM_TAGS"

          if [ -n "$NEW_TAGS" ]; then
            echo "NEW_TAGS=$(echo -e "$NEW_TAGS" | tr '\n' ' ' | sed 's/ $//')" >> "$GITHUB_OUTPUT"
            echo "has_new_tag=true" >> "$GITHUB_OUTPUT"
            echo "New tags detected: $NEW_TAGS"
          else
            echo "has_new_tag=false" >> "$GITHUB_OUTPUT"
            echo "No new tags beyond baseline $SAFE_BASELINE"
          fi

      - name: Check for existing issue
        if: steps.fetch.outputs.has_new_tag == 'true'
        id: issue_check
        run: |
          NEW_TAGS="${{ steps.fetch.outputs.NEW_TAGS }}"
          FIRST_TAG=$(echo "$NEW_TAGS" | awk '{print $1}')

          # 检查是否已有同名 issue（避免重复创建）
          EXISTING=$(curl -fsSL \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&labels=upstream-check&per_page=50" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            | jq -r --arg tag "$FIRST_TAG" '.[] | select(.title | contains($tag)) | .number' 2>/dev/null | head -1)

          if [ -n "$EXISTING" ]; then
            echo "Issue already exists for $FIRST_TAG (#${EXISTING}), skipping creation"
            echo "should_create=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_create=true" >> "$GITHUB_OUTPUT"
            echo "first_tag=$FIRST_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Create security audit issue
        if: steps.fetch.outputs.has_new_tag == 'true' && steps.issue_check.outputs.should_create == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const newTags = '${{ steps.fetch.outputs.NEW_TAGS }}'.trim().split(/\s+/);
            const firstTag = newTags[0];
            const upstreamRepo = 'TeaOSLab/EdgeAdmin';
            const safeBaseline = 'v1.3.9';

            const tagList = newTags.map(t =>
              `- [\`${t}\`](https://github.com/${upstreamRepo}/releases/tag/${t})`
            ).join('\n');

            const body = `## 上游安全审计通知

            GoEdge 上游仓库检测到新版本，**必须人工代码审计后才能决定是否合并**。

            ### 检测到的新版本

            ${tagList}

            ### 安全背景

            GoEdge v1.4.0 和 v1.4.1 曾被植入恶意代码（详见 [安全研究报告](../../blob/main/research_report_freecdn_goedge.md)）。
            FreeCDN 当前锁定安全基线为 \`${safeBaseline}\`，**任何上游变更都必须通过人工审计**，不自动合并。

            ### 审计清单

            请在合并前完成以下检查：

            - [ ] 查看 [${firstTag} 与 ${safeBaseline} 的 diff](https://github.com/${upstreamRepo}/compare/${safeBaseline}...${firstTag})
            - [ ] 检查所有新增的 \`go.mod\` 依赖（是否引入可疑包）
            - [ ] 检查网络请求代码（是否有新增的外发请求）
            - [ ] 检查 \`internal/\` 下的变更（尤其是 utils、apps、nodes 目录）
            - [ ] 检查 \`cmd/\` 下的变更
            - [ ] 检查是否包含二进制文件或混淆代码
            - [ ] 确认 changelog 中描述的功能与实际代码变更一致

            ### 操作指引

            **如果审计通过**，在此 Issue 中留言并关闭，然后手动更新 \`PLAN.md\` 中的版本基线。

            **如果审计发现问题**，在此 Issue 中记录并保持 open 状态，**不要合并**。

            ---
            *此 Issue 由 [Upstream Security Check](.github/workflows/upstream-check.yml) 自动创建，检测时间: ${new Date().toISOString()}*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[安全审计] 检测到 GoEdge 上游新版本: ${firstTag}`,
              body: body,
              labels: ['upstream-check', 'security'],
            });

            core.info(`Created security audit issue for ${firstTag}`);
