<!-- 集群管理模块 - 现代化优化版本 -->
{$layout}

<div class="clusters-container modern-layout">
    <!-- 页面标题 -->
    <div class="page-header">
        <h1>集群管理</h1>
        <p class="page-description">管理全球分布式集群，配置节点信息和负载均衡</p>
    </div>

    <!-- 操作栏 -->
    <div class="action-bar">
        <button class="ui button primary" @click="createCluster" v-if="canCreate">
            <i class="icon plus"></i> 创建集群
        </button>
        <div class="search-box">
            <input type="text" placeholder="搜索集群名称..." v-model="searchText" @input="filterClusters">
        </div>
    </div>

    <!-- 集群卡片网格 -->
    <div class="clusters-grid" v-if="!isLoading">
        <div class="cluster-card" v-for="cluster in filteredClusters" :key="cluster.id">
            <!-- 卡片头部 -->
            <div class="card-header">
                <div class="header-info">
                    <h3 class="cluster-name">{{cluster.name}}</h3>
                    <span class="cluster-region">{{cluster.region}}</span>
                </div>
                <div class="header-actions">
                    <a href="" class="action-link" title="编辑" @click.prevent="editCluster(cluster)">
                        <i class="icon pencil"></i>
                    </a>
                    <a href="" class="action-link" title="删除" @click.prevent="deleteCluster(cluster)" v-if="canDelete">
                        <i class="icon trash"></i>
                    </a>
                </div>
            </div>

            <!-- 卡片内容 -->
            <div class="card-content">
                <div class="stat-row">
                    <span class="stat-label">节点数</span>
                    <span class="stat-value">{{cluster.nodeCount}}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">在线节点</span>
                    <span class="stat-value online">{{cluster.onlineNodeCount}}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">离线节点</span>
                    <span class="stat-value" :class="{offline: cluster.offlineNodeCount > 0}">{{cluster.offlineNodeCount}}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">负载均衡</span>
                    <span class="stat-value">{{cluster.loadBalance}}</span>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="card-footer">
                <div class="progress-info">
                    <span>平均负载</span>
                    <span>{{cluster.avgLoad}}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" :style="{width: cluster.avgLoad + '%'}"></div>
                </div>
            </div>

            <!-- 底部按钮 -->
            <div class="card-actions">
                <a :href="'/clusters/cluster/detail?id=' + cluster.id" class="btn btn-primary">查看详情</a>
                <a href="" class="btn btn-secondary" @click.prevent="addNode(cluster)">添加节点</a>
            </div>
        </div>
    </div>

    <!-- 空状态 -->
    <div class="empty-state" v-if="!isLoading && clusters.length == 0">
        <i class="icon cloud"></i>
        <h3>还没有集群</h3>
        <p>开始创建第一个集群来管理你的边缘节点</p>
        <button class="ui button primary" @click="createCluster">创建集群</button>
    </div>
</div>
